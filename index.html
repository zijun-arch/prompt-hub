let tab='image', idxMap={image:0, video:0, work:0};
const BS=10;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function batch(data,start,n){const r=[];for(let i=0;i<n;i++)r.push(data[(start+i)%data.length]);return r}

function render(){
const data=ALL_PROMPTS[tab], start=idxMap[tab], items=batch(data,start,BS), grid=document.getElementById('promptGrid');
const tagClass=tab==='image'?'image-tag':tab==='video'?'video-tag':'work-tag';
const tabEmoji=tab==='image'?'🖼️':tab==='video'?'🎬':'💼';
const tabNames={image:'图片生成',video:'视频生成',work:'日常工作'};
grid.innerHTML=items.map((item,i)=>`
<div class="prompt-card" onclick="this.classList.toggle('expanded')">
<div class="prompt-card-header"><h3>${item.title}</h3><span class="card-index">#${String(start+i+1).padStart(2,'0')}</span></div>
<div class="tags">${item.tags.map(t=>\`<span class="tag \${tagClass}">\${t}</span>\`).join('')}<span class="source-badge">📡 ${item.source}</span></div>
<div class="prompt-text">${item.prompt}</div>
<div class="expand-hint">👆 点击展开 / 收起全文</div>
</div>`).join('');
document.getElementById('category-title').textContent=tabEmoji+' '+tabNames[tab]+'提示词';
document.getElementById('prompt-count').textContent='共 '+BS+' 条';
}

function refresh(){
const btn=document.getElementById('refreshBtn');btn.classList.add('spinning');
idxMap[tab]=(idxMap[tab]+BS)%ALL_PROMPTS[tab].length;
render();setTimeout(()=>btn.classList.remove('spinning'),400);
const t=document.getElementById('toast');t.textContent='✅ 已刷新，展示新一批提示词！';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
}

document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',function(){
document.querySelectorAll('.tab-btn').forEach(x=>{x.classList.remove('active-image','active-video','active-work')});
this.classList.add('active-'+this.dataset.tab);
tab=this.dataset.tab;
render();
}));
document.getElementById('refreshBtn').addEventListener('click',refresh);
render();
</script>
