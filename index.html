<div class="tags">${item.tags.map(t=>`<span class="tag ${tab}">${t}</span>`).join('')}<span class="source-badge">📡 ${item.source}</span></div>
<div class="prompt-text">${item.prompt}</div>
<div class="expand-hint">👆 点击展开 / 收起全文</div>
</div>`).join('');
document.getElementById('category-title').textContent=tab==='image'?'🖼️ 图片生成提示词':'🎬 视频生成提示词';
document.getElementById('prompt-count').textContent='共 10 条';
}

function refresh(){
const btn=document.getElementById('refreshBtn');btn.classList.add('spinning');
if(tab==='image')imgIdx=(imgIdx+BS)%ALL_PROMPTS.image.length;else vidIdx=(vidIdx+BS)%ALL_PROMPTS.video.length;
render();setTimeout(()=>btn.classList.remove('spinning'),400);
const t=document.getElementById('toast');t.textContent='✅ 已刷新，展示新一批提示词！';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
}

document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',function(){
document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');tab=this.dataset.tab;render();
}));
document.getElementById('refreshBtn').addEventListener('click',refresh);
render();
</script>
</body>
</html>
