<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptHub - AI提示词工具库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f14;--card:#1a1a24;--card-hover:#22223a;--border:#2a2a3e;--primary:#7c5cfc;--primary-light:#9d7cff;--text:#e8e8f0;--text-dim:#8888a0;--accent-green:#34d399;--accent-pink:#f472b6;--accent-amber:#fbbf24;--accent-blue:#60a5fa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{position:sticky;top:0;z-index:100;background:rgba(15,15,20,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;padding:0 24px}
.header-inner{max-width:1200px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--primary-light),var(--accent-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--accent-pink));border-radius:8px;font-size:16px;color:#fff;-webkit-text-fill-color:#fff}
.container{max-width:1200px;margin:0 auto;padding:24px}
.hero{text-align:center;padding:40px 0 32px}
.hero h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#fff,var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.hero p{color:var(--text-dim);font-size:15px;max-width:560px;margin:0 auto;line-height:1.6}
.tabs{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.tab-btn{padding:10px 24px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none}
.tab-btn:hover{border-color:var(--primary);color:var(--text)}
.tab-btn.active-image{background:linear-gradient(135deg,var(--primary),#5b3fd4);border-color:transparent;color:#fff;box-shadow:0 4px 20px rgba(124,92,252,0.3)}
.tab-btn.active-video{background:linear-gradient(135deg,#f59e0b,#d97706);border-color:transparent;color:#fff;box-shadow:0 4px 20px rgba(245,158,11,0.3)}
.tab-btn.active-work{background:linear-gradient(135deg,var(--accent-green),#059669);border-color:transparent;color:#fff;box-shadow:0 4px 20px rgba(52,211,153,0.3)}
.category-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.category-header h2{font-size:20px;font-weight:700}
.category-header .count{color:var(--text-dim);font-size:14px}
.refresh-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;transition:all .2s;user-select:none}
.refresh-btn:hover{border-color:var(--primary);background:var(--card-hover)}
.prompt-grid{display:grid;grid-template-columns:1fr;gap:16px}
.prompt-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:all .2s;cursor:pointer}
.prompt-card:hover{border-color:var(--primary);background:var(--card-hover);transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,92,252,0.1)}
.prompt-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.prompt-card-header h3{font-size:16px;font-weight:700;line-height:1.4;flex:1}
.card-index{display:flex;align-items:center;justify-content:center;min-width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--primary),#5b3fd4);color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:500}
.tag.image-tag{background:rgba(124,92,252,0.15);color:var(--primary-light)}
.tag.video-tag{background:rgba(245,158,11,0.15);color:#fbbf24}
.tag.work-tag{background:rgba(52,211,153,0.15);color:var(--accent-green)}
.prompt-text{color:var(--text-dim);font-size:14px;line-height:1.7;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.prompt-card.expanded .prompt-text{-webkit-line-clamp:unset}
.expand-hint{color:var(--primary-light);font-size:13px;margin-top:8px;opacity:0.7}
.source-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(255,255,255,0.05);color:var(--text-dim)}
.loading{text-align:center;padding:60px 20px;color:var(--text-dim)}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{text-align:center;padding:60px 20px;color:var(--accent-pink)}
.error-state .retry-btn{margin-top:12px;padding:8px 20px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;cursor:pointer}
.error-state .retry-btn:hover{border-color:var(--primary)}
footer{text-align:center;padding:40px 24px;color:var(--text-dim);font-size:13px;border-top:1px solid var(--border);margin-top:40px}
footer a{color:var(--primary-light);text-decoration:none}
@media(min-width:768px){.prompt-grid{grid-template-columns:1fr 1fr}.hero h1{font-size:40px}}
</style>
</head>
<body>
<header>
<div class="header-inner">
<div class="logo"><span class="logo-badge">P</span>PromptHub</div>
<span style="color:var(--text-dim);font-size:13px;">精选 AI 图片 · 视频 · 工作提示词</span>
</div>
</header>
<main class="container">
<div class="hero">
<h1>AI 提示词工具库</h1>
<p>精选高质量 AI Prompt 合集<br>点击卡片查看完整内容 · 刷新即可获取新一批灵感</p>
</div>
<div class="tabs">
<button class="tab-btn active-image" data-tab="image">🖼️ 图片生成</button>
<button class="tab-btn" data-tab="video">🎬 视频生成</button>
<button class="tab-btn" data-tab="work">💼 日常工作</button>
</div>
<div class="category-header">
<div><h2 id="categoryTitle">🖼️ 图片生成提示词</h2><span class="count" id="promptCount">共 0 条</span></div>
<button class="refresh-btn" id="refreshBtn">🔄 换一批</button>
</div>
<div class="prompt-grid" id="promptGrid">
<div class="loading" id="loadingState">
<div class="spinner"></div>
<div>正在加载提示词数据...</div>
</div>
</div>
</main>
<footer>
PromptHub · 数据来源自全网精选 · 仅供学习参考<br>
<a href="https://github.com/zijun-arch/prompt-hub" target="_blank" rel="noopener">GitHub</a>
</footer>

<script>
(function() {
  'use strict';

  // ---------- 状态 ----------
  var currentTab = 'image';
  var startIndex = { image: 0, video: 0, work: 0 };
  var PAGE_SIZE = 10;
  var allData = null; // 加载后填充

  // ---------- DOM 引用 ----------
  var grid = document.getElementById('promptGrid');
  var categoryTitle = document.getElementById('categoryTitle');
  var promptCount = document.getElementById('promptCount');
  var loadingState = document.getElementById('loadingState');

  // ---------- 工具函数 ----------
  function getBatch() {
    if (!allData) return [];
    var data = allData[currentTab];
    var start = startIndex[currentTab];
    var batch = [];
    for (var i = 0; i < PAGE_SIZE; i++) {
      batch.push(data[(start + i) % data.length]);
    }
    return batch;
  }

  // ---------- 渲染 ----------
  function render() {
    if (!allData) return;

    var batch = getBatch();
    var tagClassMap = { image: 'image-tag', video: 'video-tag', work: 'work-tag' };
    var emojiMap = { image: '\u{1F5BC}\uFE0F', video: '\u{1F3AC}', work: '\u{1F4BC}' };
    var nameMap = { image: '\u56FE\u7247\u751F\u6210', video: '\u89C6\u9891\u751F\u6210', work: '\u65E5\u5E38\u5DE5\u4F5C' };
    var tagClass = tagClassMap[currentTab];

    var html = '';
    for (var i = 0; i < batch.length; i++) {
      var item = batch[i];
      var realIndex = startIndex[currentTab] + i + 1;
      var padded = ('0' + realIndex).slice(-2);

      var tagsHtml = '';
      for (var t = 0; t < item.tags.length; t++) {
        tagsHtml += '<span class="tag ' + tagClass + '">' + item.tags[t] + '</span>';
      }

      html += '<div class="prompt-card" onclick="this.classList.toggle(\'expanded\')">' +
        '<div class="prompt-card-header">' +
          '<h3>' + item.title + '</h3>' +
          '<span class="card-index">#' + padded + '</span>' +
        '</div>' +
        '<div class="tags">' +
          tagsHtml +
          '<span class="source-badge">📡 ' + item.source + '</span>' +
        '</div>' +
        '<div class="prompt-text">' + item.prompt + '</div>' +
        '<div class="expand-hint">👆 点击展开 / 收起全文</div>' +
      '</div>';
    }

    grid.innerHTML = html;
    categoryTitle.textContent = emojiMap[currentTab] + ' ' + nameMap[currentTab] + '提示词';
    promptCount.textContent = '共 ' + PAGE_SIZE + ' 条';
  }

  // ---------- 加载数据 ----------
  function loadData() {
    // 显示加载中
    grid.innerHTML = '<div class="loading"><div class="spinner"></div><div>正在加载提示词数据...</div></div>';

    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'data.json', true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          try {
            allData = JSON.parse(xhr.responseText);
            render();
          } catch (e) {
            grid.innerHTML = '<div class="error-state">❌ 数据解析失败: ' + e.message + '<br><button class="retry-btn" onclick="location.reload()">重新加载</button></div>';
          }
        } else {
          grid.innerHTML = '<div class="error-state">❌ 数据加载失败 (HTTP ' + xhr.status + ')<br><button class="retry-btn" onclick="location.reload()">重新加载</button></div>';
        }
      }
    };
    xhr.onerror = function() {
      grid.innerHTML = '<div class="error-state">❌ 网络错误，无法加载数据<br><button class="retry-btn" onclick="location.reload()">重新加载</button></div>';
    };
    xhr.send();
  }

  // ---------- 切换分类 ----------
  function switchTab(tab) {
    currentTab = tab;
    var buttons = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < buttons.length; i++) {
      var btn = buttons[i];
      btn.className = 'tab-btn';
      if (btn.dataset.tab === tab) {
        btn.classList.add('active-' + tab);
      }
    }
    render();
  }

  // ---------- 刷新 ----------
  function refresh() {
    if (!allData) return;
    var data = allData[currentTab];
    startIndex[currentTab] = (startIndex[currentTab] + PAGE_SIZE) % data.length;
    render();
  }

  // ---------- 初始化 ----------
  document.addEventListener('DOMContentLoaded', function() {
    // 绑定标签切换
    var buttons = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].addEventListener('click', function() {
        switchTab(this.dataset.tab);
      });
    }

    // 绑定刷新按钮
    document.getElementById('refreshBtn').addEventListener('click', refresh);

    // 加载数据
    loadData();
  });
})();
</script>
</body>
</html>
